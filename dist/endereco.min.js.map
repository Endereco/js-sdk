module.exports = "<div endereco-street-full-predictions data-id=\"{{ExtendableObject.id}}\" class=\"endereco-predictions-wrapper endereco-predictions-wrapper--direction-{{direction}} {{#longList}}endereco-predictions-wrapper--longlist{{/longList}}\" style=\"top: {{offsetTop}}px; left: {{offsetLeft}}px; width: {{width}}px;\">\n\t<div class=\"endereco-predictions-wrapper-inner\">\n\t\t<ul class=\"endereco-predictions\">\n\t\t\t{{#predictions}}\n\t\t\t<li class=\"endereco-predictions__item {{#isActive}}active{{/isActive}}\" endereco-street-full-prediction data-prediction-index=\"{{index}}\" data-prediction-type=\"streetFull\">{{{streetFullDiff}}}</li>\n\t\t\t{{/predictions}}\n\t\t</ul>\n\t</div>\n</div>\n";
